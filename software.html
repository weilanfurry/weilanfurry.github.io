<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>软件服务 - 蔚澜开发者生态</title>
    <style>
      :root {
        --bg0: #121212;
        --card: #1a1a1a;
        --stroke: #333333;
        --text: #ffffff;
        --muted: #999999;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        --radius-pill: 9999px;
        --radius-card: 20px;
        --accent: #ff8c00;
        --maxw: 1100px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, Roboto, ui-sans-serif, system-ui, -apple-system,
          Segoe UI, "HarmonyOS Sans SC", "Source Han Sans SC", "Noto Sans CJK SC",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, "Noto Sans",
          sans-serif;
        background: var(--bg0);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        pointer-events: none;
        width: 560px;
        height: 560px;
        border-radius: 50%;
        background: rgba(255, 140, 0, 0.14);
        filter: blur(90px);
        opacity: 0.9;
      }
      body::before {
        top: -240px;
        left: -220px;
      }
      body::after {
        top: -260px;
        right: -240px;
        opacity: 0.6;
      }

      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 110px 20px 60px;
      }

      .nav {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: min(calc(100% - 40px), var(--maxw));
        height: 58px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 14px;
        padding: 10px 14px;
        border-radius: var(--radius-pill);
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.5);
        z-index: 50;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .brand-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(255, 140, 0, 0.12);
        flex: 0 0 auto;
      }
      .brand-title {
        font-weight: 700;
        letter-spacing: 0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-links {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        line-height: 1;
        padding: 6px;
        border-radius: var(--radius-pill);
        background: var(--bg0);
        border: 1px solid var(--stroke);
        min-width: 260px;
      }
      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 34px;
        padding: 0 12px;
        border-radius: var(--radius-pill);
        text-decoration: none;
        font-weight: 800;
        font-size: 13px;
        color: var(--muted);
        border: 1px solid transparent;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
        user-select: none;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: var(--text);
        background: rgba(255, 140, 0, 0.1);
      }
      .nav-link[aria-current="page"] {
        color: var(--text);
        background: rgba(255, 140, 0, 0.16);
        border-color: rgba(255, 140, 0, 0.35);
      }

      .nav-right {
        display: flex;
        justify-content: flex-end;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 38px;
        padding: 0 16px;
        border-radius: var(--radius-pill);
        text-decoration: none;
        font-weight: 700;
        color: #121212;
        background: var(--accent);
        border: 1px solid rgba(255, 140, 0, 0.6);
        box-shadow: 0 14px 34px rgba(255, 140, 0, 0.22);
        transition: transform 120ms ease, filter 120ms ease;
        user-select: none;
      }
      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }
      .btn:active {
        transform: translateY(0px);
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.55);
        z-index: 80;
      }
      .modal[data-open="true"] {
        display: flex;
      }
      .modal-panel {
        width: min(520px, 100%);
        border-radius: 20px;
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        padding: 18px;
      }
      .modal-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.3px;
      }
      .modal-desc {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      .modal-code {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 9999px;
        border: 1px solid var(--stroke);
        background: #121212;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.6px;
      }
      .modal-code b {
        color: var(--text);
      }
      .modal-actions {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 38px;
        padding: 0 14px;
        border-radius: 9999px;
        text-decoration: none;
        font-weight: 700;
        color: var(--text);
        background: transparent;
        border: 1px solid var(--stroke);
        transition: transform 120ms ease, filter 120ms ease;
        user-select: none;
        cursor: pointer;
      }
      .btn-ghost:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }
      .btn-ghost:active {
        transform: translateY(0px);
      }

      .cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .card {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 18px;
        padding: 18px;
        border-radius: var(--radius-card);
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        transition: transform 140ms ease, box-shadow 140ms ease,
          border-color 140ms ease;
      }
      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.38);
        border-color: rgba(255, 255, 255, 0.22);
      }

      .media {
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--stroke);
        background: #141414;
        aspect-ratio: 4 / 3;
        display: grid;
        place-items: center;
      }
      .media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .content {
        padding: 6px 6px 6px 2px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        min-width: 0;
      }
      .content h2 {
        margin: 0;
        font-size: clamp(20px, 1.8vw, 26px);
        letter-spacing: 0.4px;
      }
      .content p {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
        font-size: 15px;
      }

      .hint {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.7;
      }

      @media (max-width: 860px) {
        .card {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 520px) {
        .nav-links {
          min-width: 220px;
          padding: 6px 8px;
          gap: 4px;
        }
        .nav-link {
          height: 30px;
          padding: 0 10px;
          font-size: 12px;
        }
        .brand-title {
          max-width: 130px;
        }
        .btn {
          padding: 0 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav" role="navigation" aria-label="顶部导航">
      <div class="brand" aria-label="站点名称">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-title">蔚澜开发者生态</span>
      </div>

      <nav class="nav-links" aria-label="主导航">
        <a class="nav-link" href="./index.html">首页</a>
        <a class="nav-link" href="./bottle.html">Bottle系列</a>
        <a class="nav-link" href="./software.html" aria-current="page">软件服务</a>
      </nav>

      <div class="nav-right">
        <a class="btn" href="#join" id="joinBtn" aria-label="加入我们">加入我们</a>
      </div>
    </header>

    <main class="wrap">
      <p class="hint">
        这里是一个示例落地页布局：上方悬浮药丸导航栏，下面两个悬浮大模块（左图右文）。
      </p>

      <section class="cards" aria-label="内容模块">
        <article class="card">
          <div class="media" aria-label="示例照片 1">
            <img src="assets/photo-1.svg" alt="示例照片 1（4:3）" />
          </div>
          <div class="content">
            <h2>从工具链到生态：让开发更顺滑</h2>
            <p>
              统一的规范、清晰的文档与可复用的组件，能让团队交付更快、质量更稳。我们把常用能力做成标准化模块，
              让你把时间用在真正重要的产品体验上。
            </p>
          </div>
        </article>

        <article class="card" id="join">
          <div class="media" aria-label="示例照片 2">
            <img src="assets/photo-2.svg" alt="示例照片 2（4:3）" />
          </div>
          <div class="content">
            <h2>加入我们：一起打磨开发者体验</h2>
            <p>
              不论你擅长前端、后端、设计系统还是工程化，都可以从一个小改动开始贡献：修复文档、提交组件、完善规范与模板。
              点击右上角“加入我们”，从第一步开始。
            </p>
          </div>
        </article>
      </section>
    </main>

    <div class="modal" id="joinModal" role="dialog" aria-modal="true" aria-labelledby="joinTitle">
      <div class="modal-panel" role="document">
        <h3 class="modal-title" id="joinTitle">加入我们</h3>
        <p class="modal-desc" id="joinMsg">QQ群号已复制入粘贴板</p>
        <div class="modal-code" aria-label="QQ群号">
          <span style="color: var(--muted)">QQ群：</span>
          <b id="qqNumber">996390776</b>
        </div>
        <div class="modal-actions">
          <button class="btn-ghost" type="button" id="modalClose">关闭</button>
          <button class="btn" type="button" id="modalCopy" aria-label="重新复制QQ群号">重新复制</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        const QQ = "996390776";
        const joinBtn = document.getElementById("joinBtn");
        const modal = document.getElementById("joinModal");
        const closeBtn = document.getElementById("modalClose");
        const copyBtn = document.getElementById("modalCopy");
        const msgEl = document.getElementById("joinMsg");
        const qqEl = document.getElementById("qqNumber");
        qqEl.textContent = QQ;

        function setOpen(open) {
          modal.dataset.open = open ? "true" : "false";
          if (open) closeBtn.focus();
        }

        async function copyToClipboard(text) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch (_) {
            try {
              const ta = document.createElement("textarea");
              ta.value = text;
              ta.setAttribute("readonly", "");
              ta.style.position = "fixed";
              ta.style.left = "-9999px";
              document.body.appendChild(ta);
              ta.select();
              const ok = document.execCommand("copy");
              document.body.removeChild(ta);
              return ok;
            } catch (_) {
              return false;
            }
          }
        }

        async function openAndCopy() {
          const ok = await copyToClipboard(QQ);
          msgEl.textContent = ok ? "QQ群号已复制入粘贴板" : "复制失败，请手动复制QQ群号";
          setOpen(true);
        }

        joinBtn.addEventListener("click", (e) => {
          e.preventDefault();
          openAndCopy();
        });

        copyBtn.addEventListener("click", () => {
          openAndCopy();
        });

        closeBtn.addEventListener("click", () => setOpen(false));

        modal.addEventListener("click", (e) => {
          if (e.target === modal) setOpen(false);
        });

        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && modal.dataset.open === "true") setOpen(false);
        });
      })();
    </script>
  </body>
</html>
