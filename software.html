<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>氧分科技 - 蔚澜开发者生态</title>
    <style>
      :root {
        --bg0: #121212;
        --card: #1a1a1a;
        --stroke: #333333;
        --text: #ffffff;
        --muted: #999999;
        --shadow: 0 18px 50px rgba(0, 0, 0, 0.45);
        --radius-pill: 9999px;
        --radius-card: 20px;
        --accent: #ff8c00;
        --maxw: 1100px;
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        color: var(--text);
        font-family: Inter, Roboto, ui-sans-serif, system-ui, -apple-system,
          Segoe UI, "HarmonyOS Sans SC", "Source Han Sans SC", "Noto Sans CJK SC",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, "Noto Sans",
          sans-serif;
        background: var(--bg0);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        pointer-events: none;
        width: 560px;
        height: 560px;
        border-radius: 50%;
        background: rgba(255, 140, 0, 0.14);
        filter: blur(90px);
        opacity: 0.9;
      }
      body::before {
        top: -240px;
        left: -220px;
      }
      body::after {
        top: -260px;
        right: -240px;
        opacity: 0.6;
      }

      .wrap {
        max-width: var(--maxw);
        margin: 0 auto;
        padding: 110px 20px 60px;
      }

      .nav {
        position: fixed;
        top: 18px;
        left: 50%;
        transform: translateX(-50%);
        width: min(calc(100% - 40px), var(--maxw));
        height: 58px;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 14px;
        padding: 10px 14px;
        border-radius: var(--radius-pill);
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.5);
        z-index: 50;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .brand-dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 0 6px rgba(255, 140, 0, 0.12);
        flex: 0 0 auto;
      }
      .brand-title {
        font-weight: 700;
        letter-spacing: 0.5px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .nav-links {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        line-height: 1;
        padding: 2px;
        border-radius: var(--radius-pill);
        background: var(--bg0);
        border: 1px solid var(--stroke);
        min-width: 260px;
      }
      .nav-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 34px;
        padding: 0 12px;
        border-radius: var(--radius-pill);
        text-decoration: none;
        font-weight: 800;
        font-size: 13px;
        color: var(--muted);
        border: 1px solid transparent;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
        user-select: none;
        white-space: nowrap;
      }
      .nav-link:hover {
        color: var(--text);
        background: rgba(255, 140, 0, 0.1);
      }
      .nav-link[aria-current="page"] {
        color: var(--text);
        background: rgba(255, 140, 0, 0.16);
        border-color: rgba(255, 140, 0, 0.35);
      }

      .nav-right {
        display: flex;
        justify-content: flex-end;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 38px;
        padding: 0 16px;
        border-radius: var(--radius-pill);
        text-decoration: none;
        font-weight: 700;
        color: #121212;
        background: var(--accent);
        border: 1px solid rgba(255, 140, 0, 0.6);
        box-shadow: 0 14px 34px rgba(255, 140, 0, 0.22);
        transition: transform 120ms ease, filter 120ms ease;
        user-select: none;
      }
      .btn:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }
      .btn:active {
        transform: translateY(0px);
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.55);
        z-index: 80;
      }
      .modal[data-open="true"] {
        display: flex;
      }
      .modal-panel {
        width: min(520px, 100%);
        border-radius: 20px;
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        padding: 18px;
      }
      .modal-title {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.3px;
      }
      .modal-desc {
        margin: 10px 0 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14px;
      }
      .modal-code {
        margin-top: 14px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 9999px;
        border: 1px solid var(--stroke);
        background: #121212;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.6px;
      }
      .modal-code b {
        color: var(--text);
      }
      .modal-actions {
        margin-top: 16px;
        display: flex;
        justify-content: flex-end;
        gap: 10px;
      }
      .btn-ghost {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        height: 38px;
        padding: 0 14px;
        border-radius: 9999px;
        text-decoration: none;
        font-weight: 700;
        color: var(--text);
        background: transparent;
        border: 1px solid var(--stroke);
        transition: transform 120ms ease, filter 120ms ease;
        user-select: none;
        cursor: pointer;
      }
      .btn-ghost:hover {
        transform: translateY(-1px);
        filter: brightness(1.02);
      }
      .btn-ghost:active {
        transform: translateY(0px);
      }

      .cards {
        display: grid;
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .card {
        display: grid;
        grid-template-columns: 380px 1fr;
        gap: 18px;
        padding: 18px;
        border-radius: var(--radius-card);
        background: var(--card);
        border: 1px solid var(--stroke);
        box-shadow: var(--shadow);
        transition: transform 140ms ease, box-shadow 140ms ease,
          border-color 140ms ease;
      }
      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 26px 70px rgba(0, 0, 0, 0.38);
        border-color: rgba(255, 255, 255, 0.22);
      }

      .media {
        border-radius: 16px;
        overflow: hidden;
        border: 1px solid var(--stroke);
        background: #141414;
        aspect-ratio: 4 / 3;
        display: grid;
        place-items: center;
      }
      .media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .content {
        padding: 6px 6px 6px 2px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        min-width: 0;
      }
      .content h2 {
        margin: 0;
        font-size: clamp(20px, 1.8vw, 26px);
        letter-spacing: 0.4px;
      }
      .content p {
        margin: 0;
        color: var(--muted);
        line-height: 1.8;
        font-size: 15px;
      }

      .hint {
        margin: 0 0 14px;
        color: var(--muted);
        line-height: 1.7;
      }

      @media (max-width: 860px) {
        .card {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 520px) {
        .nav-links {
          min-width: 220px;
          padding: 2px 6px;
          gap: 4px;
        }
        .nav-link {
          height: 30px;
          padding: 0 10px;
          font-size: 12px;
        }
        .brand-title {
          max-width: 130px;
        }
        .btn {
          padding: 0 12px;
        }
      }
    </style>
  </head>
  <body>
    <header class="nav" role="navigation" aria-label="顶部导航">
      <div class="brand" aria-label="站点名称">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-title">蔚澜开发者生态</span>
      </div>

      <nav class="nav-links" aria-label="主导航">
        <a class="nav-link" href="./index.html">首页</a>
        <a class="nav-link" href="./bottle.html">Bottle系列</a>
        <a class="nav-link" href="./software.html" aria-current="page">氧分科技</a>
      </nav>

      <div class="nav-right">
        <!-- 占位：保持三列导航布局 -->
      </div>
    </header>

    <main class="wrap">
      <section class="cards" aria-label="内容模块">
        <article class="card">
          <div class="media" aria-label="示例照片 1">
            <img src="assets/photo-1.svg" alt="示例照片 1（4:3）" />
          </div>
          <div class="content">
            <h2>第一张代码专辑</h2>
            <p>正在研发</p>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
